<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reports</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-boxes-stacked"></i>

            <span>InventoryMS</span>

        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </li>

            <li onclick="location.href='inventory.html'">
                <i class="fa-solid fa-box"></i>
                <span>Inventory</span>
            </li>

            <li onclick="location.href='orders.html'">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Orders</span>
            </li>

            <li onclick="location.href='returns.html'">
                <i class="fa-solid fa-rotate-left"></i>
                <span>Returns</span>
            </li>

            <li onclick="location.href='users.html'">
                <i class="fa-solid fa-users"></i>
                <span>Users</span>
            </li>

            <li class="active">
                <i class="fa-solid fa-chart-column"></i>
                <span>Reports</span>
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <header class="topbar">

            <h2>Reports & Analytics</h2>

        </header>

        <!-- Cards -->

        <section class="cards">

            <div class="card">

                <h3>Total Inventory Value</h3>

                <h1 id="inventoryValue">$0</h1>

            </div>

            <div class="card">

                <h3>Total Products</h3>

                <h1 id="reportProducts">0</h1>

            </div>

            <div class="card">

                <h3>Low Stock Items</h3>

                <h1 id="reportLowStock">0</h1>

            </div>

            <div class="card">

                <h3>Forecast</h3>

                <h1 id="forecast">Stable</h1>

            </div>

        </section>

        <!-- Low Stock Report -->

        <section class="orders">

            <h3 style="margin-bottom:20px;">

                Low Stock Report

            </h3>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Stock</th>
                        <th>Minimum</th>

                    </tr>

                </thead>

                <tbody id="reportTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/reports.js"></script>

</body>

</html>
