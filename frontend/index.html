<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Azure Inventory</title>

    <link rel="stylesheet"
        href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>

        body{

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            background:#2563eb;

            padding:20px;

        }

        .login{

            background:#fff;

            width:430px;

            padding:45px;

            border-radius:18px;

            box-shadow:0 18px 45px rgba(0,0,0,.18);

            text-align:center;

        }

        .logo{

            width:75px;

            height:75px;

            margin:0 auto 20px;

            border-radius:50%;

            background:#e8f0ff;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .logo i{

            font-size:34px;

            color:#2563eb;

        }

        .app-title{

            font-size:34px;

            font-weight:700;

            color:#2563eb;

            margin-bottom:8px;

        }

        .welcome{

            font-size:26px;

            font-weight:600;

            color:#1f2937;

            margin-bottom:10px;

        }

        .subtitle{

            color:#6b7280;

            font-size:15px;

            line-height:1.6;

            margin-bottom:35px;

        }

        input{

            width:100%;

            padding:14px;

            margin-bottom:18px;

            border:1px solid #d1d5db;

            border-radius:8px;

            font-size:15px;

        }

        input:focus{

            border-color:#2563eb;

        }

        button{

            width:100%;

            padding:14px;

            background:#2563eb;

            color:#fff;

            border:none;

            border-radius:8px;

            font-size:16px;

            font-weight:600;

            transition:.3s;

        }

        button:hover{

            background:#1d4ed8;

        }

        .footer{

            margin-top:28px;

            font-size:13px;

            color:#9ca3af;

        }

    </style>

</head>

<body>

<div class="login">

    <div class="logo">

        <i class="fa-solid fa-boxes-stacked"></i>

    </div>

    <div class="app-title">

        Azure Inventory

    </div>

    <div class="welcome">

        Welcome Back!

    </div>

    <div class="subtitle">

        Sign in to access the Inventory Management System.

    </div>

    <input

        type="email"

        placeholder="Email Address"

        id="username">

    <input

        type="password"

        placeholder="Password"

        id="password">

    <button onclick="login()">

        Login

    </button>

    <div class="footer">

        Azure Inventory Management System

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>

async function login(){

    const email =
        document.getElementById("username").value.trim();

    const password =
        document.getElementById("password").value;

    if(!email || !password){

        alert("Enter Email and Password");

        return;

    }

    try{

        const response =
            await apiPost(
                "login",
                {
                    email,
                    password
                }
            );

        saveUser({

            ...response.user,

            mustChangePassword:
                response.mustChangePassword

        });

        if(response.mustChangePassword){

            window.location.href =
                "changePassword.html";

        }

        else{

            window.location.href =
                "dashboard.html";

        }

    }

    catch(error){

        alert("Invalid Email or Password");

    }

}

</script>

</body>

</html>
