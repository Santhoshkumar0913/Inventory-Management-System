<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Inventory Login</title>

    <link rel="stylesheet"
        href="css/style.css">

    <style>

        body{

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

            background:#2563eb;

        }

        .login{

            background:white;

            padding:40px;

            border-radius:10px;

            width:350px;

            box-shadow:0 10px 20px rgba(0,0,0,.2);

        }

        h2{

            text-align:center;

            margin-bottom:25px;

        }

        input{

            width:100%;

            padding:12px;

            margin-bottom:15px;

            box-sizing:border-box;

        }

        button{

            width:100%;

            background:#2563eb;

            color:white;

            padding:12px;

            border:none;

            cursor:pointer;

            border-radius:5px;

        }

    </style>

</head>

<body>

<div class="login">

    <h2>Inventory Login</h2>

    <input
        type="email"
        placeholder="Email"
        id="username">

    <input
        type="password"
        placeholder="Password"
        id="password">

    <button onclick="login()">

        Login

    </button>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>

async function login(){

    const email =
        document.getElementById("username").value.trim();

    const password =
        document.getElementById("password").value;

    if(!email || !password){

        alert("Enter Email and Password");

        return;

    }

    try{

        const response =
            await apiPost(
                "login",
                {
                    email,
                    password
                }
            );

        saveUser({

            ...response.user,

            mustChangePassword:
                response.mustChangePassword

        });

        if(response.mustChangePassword){

            window.location.href =
                "changePassword.html";

        }

        else{

            window.location.href =
                "dashboard.html";

        }

    }

    catch(error){

        alert("Invalid Email or Password");

    }

}

</script>

</body>

</html>
