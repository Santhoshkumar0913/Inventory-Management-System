<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Returns</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/forms.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-boxes-stacked"></i>

            <span>InventoryMS</span>

        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">

                <i class="fa-solid fa-house"></i>

                <span>Dashboard</span>

            </li>

            <li onclick="location.href='inventory.html'">

                <i class="fa-solid fa-box"></i>

                <span>Inventory</span>

            </li>

            <li onclick="location.href='orders.html'">

                <i class="fa-solid fa-cart-shopping"></i>

                <span>Orders</span>

            </li>

            <li class="active">

                <i class="fa-solid fa-rotate-left"></i>

                <span>Returns</span>

            </li>

            <li onclick="location.href='users.html'">

                <i class="fa-solid fa-users"></i>

                <span>Users</span>

            </li>

            <li onclick="location.href='reports.html'">

                <i class="fa-solid fa-chart-column"></i>

                <span>Reports</span>

            </li>

        </ul>

    </aside>

    <main class="main">

        <header class="topbar">

            <div class="header-left">

                <h2>Returns</h2>

            </div>

        </header>

        <section class="card">

            <h3>Create Return</h3>

            <form id="returnForm">

                <div

                    style="
                    display:grid;
                    grid-template-columns:repeat(4,1fr);
                    gap:15px;
                    margin-top:20px;">

                    <input

                        id="orderId"

                        placeholder="Order ID"

                        required>

                    <select

                        id="returnProduct"

                        required>

                    </select>

                    <input

                        id="returnQuantity"

                        type="number"

                        min="1"

                        placeholder="Quantity"

                        required>

                    <input

                        id="reason"

                        placeholder="Reason"

                        required>

                </div>

                <br>

                <button

                    type="button"

                    class="btn btn-primary"

                    onclick="createReturn()">

                    Process Return

                </button>

            </form>

        </section>

        <br>

        <section class="orders">

            <table>

                <thead>

                    <tr>

                        <th>Return ID</th>

                        <th>Order ID</th>

                        <th>Product</th>

                        <th>Quantity</th>

                        <th>Reason</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="returnsTable">

                </tbody>

            </table>

        </section>
    </main>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/returns.js"></script>

</body>

</html>
