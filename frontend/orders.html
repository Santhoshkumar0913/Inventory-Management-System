<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Orders</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/forms.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-boxes-stacked"></i>

            <span>InventoryMS</span>

        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">

                <i class="fa-solid fa-house"></i>

                <span>Dashboard</span>

            </li>

            <li onclick="location.href='inventory.html'">

                <i class="fa-solid fa-box"></i>

                <span>Inventory</span>

            </li>

            <li class="active">

                <i class="fa-solid fa-cart-shopping"></i>

                <span>Orders</span>

            </li>

            <li onclick="location.href='returns.html'">

                <i class="fa-solid fa-rotate-left"></i>

                <span>Returns</span>

            </li>

            <li onclick="location.href='users.html'">

                <i class="fa-solid fa-users"></i>

                <span>Users</span>

            </li>

            <li onclick="location.href='reports.html'">

                <i class="fa-solid fa-chart-column"></i>

                <span>Reports</span>

            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <header class="topbar">

            <h2>Orders</h2>

        </header>

        <!-- Create Order -->

        <section class="card">

            <h3>Create Order</h3>

            <form id="orderForm">

                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:20px;">

                    <input

                        id="customerName"

                        placeholder="Customer Name"

                        required>

                    <select

                        id="productSelect"

                        required>

                    </select>

                    <input

                        id="quantity"

                        type="number"

                        min="1"

                        placeholder="Quantity"

                        required>

                </div>

                <br>

                <button

                    type="button"

                    class="btn btn-primary"

                    onclick="createOrder()">

                    Place Order

                </button>

            </form>

        </section>

        <br>

        <!-- Orders Table -->

        <section class="orders">

            <table>

                <thead>

                    <tr>

                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="ordersTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/orders.js"></script>

</body>

</html>
