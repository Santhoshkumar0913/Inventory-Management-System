<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Users</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        .modal {

            display: none;

            position: fixed;

            left: 0;
            top: 0;

            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, .45);

            justify-content: center;
            align-items: center;

        }

        .modal-content {

            background: white;

            width: 420px;

            padding: 25px;

            border-radius: 10px;

        }

        .modal-content h3 {

            margin-bottom: 20px;

        }

        .modal-content input,
        .modal-content select {

            width: 100%;

            padding: 10px;

            margin-bottom: 15px;

        }

        .modal-buttons {

            display: flex;

            justify-content: flex-end;

            gap: 10px;

        }
    </style>

</head>

<body>

    <div class="container">

        <aside class="sidebar">

            <div class="logo">

                <i class="fa-solid fa-boxes-stacked"></i>

                <span>InventoryMS</span>

            </div>

            <ul>

                <li onclick="location.href='dashboard.html'">

                    <i class="fa-solid fa-house"></i>

                    <span>Dashboard</span>

                </li>

                <li onclick="location.href='inventory.html'">

                    <i class="fa-solid fa-box"></i>

                    <span>Inventory</span>

                </li>

                <li onclick="location.href='orders.html'">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span>Orders</span>

                </li>

                <li onclick="location.href='returns.html'">

                    <i class="fa-solid fa-rotate-left"></i>

                    <span>Returns</span>

                </li>

                <li class="active">

                    <i class="fa-solid fa-users"></i>

                    <span>Users</span>

                </li>

                <li onclick="location.href='reports.html'">

                    <i class="fa-solid fa-chart-column"></i>

                    <span>Reports</span>

                </li>

            </ul>

        </aside>

        <main class="main">

            <header class="topbar">

                <div class="header-left">

                    <h2>Users</h2>

                    <button class="btn btn-primary" onclick="openModal()">

                        <i class="fa-solid fa-user-plus"></i>

                        Add User

                    </button>

                </div>

            </header>

            <section class="orders">

                <table>

                    <thead>

                        <tr>

                            <th>User ID</th>

                            <th>Name</th>

                            <th>Email</th>

                            <th>Role</th>

                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody id="usersTable">

                    </tbody>

                </table>

            </section>
        </main>

    </div>

    <!-- ========================= -->

    <div class="modal" id="userModal">

        <div class="modal-content">

            <h3>Add User</h3>

            <input type="text" id="name" placeholder="Full Name">

            <input type="email" id="email" placeholder="Email">

            <select id="role">

                <option value="Admin">

                    Admin

                </option>

                <option value="Manager">

                    Manager

                </option>

                <option value="Staff">

                    Staff

                </option>

            </select>

            <select id="status">

                <option value="Active">

                    Active

                </option>

                <option value="Disabled">

                    Disabled

                </option>

            </select>

            <p>

                <b>Temporary Password :</b>

                Welcome@123

            </p>

            <div class="modal-buttons">

                <button class="btn" onclick="closeModal()">

                    Cancel

                </button>

                <button class="btn btn-primary" onclick="addUser()">

                    Create User

                </button>

            </div>

        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/users.js"></script>

</body>

</html>
