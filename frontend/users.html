<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Users</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-boxes-stacked"></i>

            <span>InventoryMS</span>

        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </li>

            <li onclick="location.href='inventory.html'">
                <i class="fa-solid fa-box"></i>
                <span>Inventory</span>
            </li>

            <li onclick="location.href='orders.html'">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Orders</span>
            </li>

            <li onclick="location.href='returns.html'">
                <i class="fa-solid fa-rotate-left"></i>
                <span>Returns</span>
            </li>

            <li class="active">
                <i class="fa-solid fa-users"></i>
                <span>Users</span>
            </li>

            <li onclick="location.href='reports.html'">
                <i class="fa-solid fa-chart-column"></i>
                <span>Reports</span>
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <header class="topbar">

            <h2>Users</h2>

            <button class="btn btn-primary">

                <i class="fa-solid fa-user-plus"></i>

                Add User

            </button>

        </header>

        <section class="orders">

            <table>

                <thead>

                    <tr>

                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="usersTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/users.js"></script>

</body>

</html>
