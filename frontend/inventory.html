<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Inventory Management</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/forms.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-boxes-stacked"></i>

            <span>InventoryMS</span>

        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">

                <i class="fa-solid fa-house"></i>

                <span>Dashboard</span>

            </li>

            <li class="active">

                <i class="fa-solid fa-box"></i>

                <span>Inventory</span>

            </li>

            <li onclick="location.href='orders.html'">

                <i class="fa-solid fa-cart-shopping"></i>

                <span>Orders</span>

            </li>

            <li onclick="location.href='returns.html'">

                <i class="fa-solid fa-rotate-left"></i>

                <span>Returns</span>

            </li>

            <li onclick="location.href='users.html'">

                <i class="fa-solid fa-users"></i>

                <span>Users</span>

            </li>

            <li onclick="location.href='reports.html'">

                <i class="fa-solid fa-chart-column"></i>

                <span>Reports</span>

            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <header class="topbar">

            <div class="header-left">

                <h2>Inventory Management</h2>

                <button
                    id="addProductBtn"
                    class="btn btn-primary"
                    onclick="openProductModal()">

                    <i class="fa-solid fa-plus"></i>

                    Add Product

                </button>

            </div>

        </header>

        <!-- Search -->

        <div
            style="
            padding:25px;
            display:flex;
            gap:15px;">

            <input

                type="text"

                id="searchInput"

                placeholder="Search Product..."

                onkeyup="searchProducts()">

        </div>

        <!-- Products -->

        <section class="orders">

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Category</th>

                        <th>Price</th>

                        <th>Stock</th>

                        <th>Status</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="inventoryTableBody">

                </tbody>

            </table>

        </section>

    </main>

</div>
<!-- ======================================== -->
<!-- Product Modal -->
<!-- ======================================== -->

<div
    id="productModal"
    class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">

                Add Product

            </h2>

            <span
                class="close"
                onclick="closeProductModal()">

                &times;

            </span>

        </div>

        <form id="productForm">

            <input
                id="productId"
                placeholder="Product ID"
                required>

            <input
                id="productName"
                placeholder="Product Name"
                required>

            <input
                id="category"
                placeholder="Category"
                required>

            <input
                id="price"
                type="number"
                placeholder="Price"
                required>

            <input
                id="stock"
                type="number"
                placeholder="Stock"
                required>

            <input
                id="minimumStock"
                type="number"
                placeholder="Minimum Stock"
                required>

            <input
                id="supplier"
                placeholder="Supplier"
                required>

            <div
                style="
                display:flex;
                gap:10px;
                margin-top:20px;">

                <button
                    type="button"
                    class="btn btn-primary"
                    onclick="saveProduct()">

                    Save

                </button>

                <button
                    type="button"
                    class="btn btn-danger"
                    onclick="closeProductModal()">

                    Cancel

                </button>

            </div>

        </form>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/inventory.js"></script>

</body>

</html>
