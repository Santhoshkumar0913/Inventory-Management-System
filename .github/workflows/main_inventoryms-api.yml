name: Build and deploy Node.js project to Azure Function App - inventoryms-api

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - '.github/workflows/main_inventoryms-api.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './functions'
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./functions

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./functions

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DCC1D3E711504D6C8A0A6C2F9513E81A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8B1DDAAA3B8F4397A0C25F33D2894DF5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E3BF5BF03CA742A1ACB2AFEC7984DFE5 }}

      - name: Deploy Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: inventoryms-api
          slot-name: Production
          package: ./functions